<svg width="740" height="860" viewBox="0 0 740 860" xmlns="http://www.w3.org/2000/svg" role="img">
<title>FinSight MCP architecture</title>
<desc>Claude Desktop connects via OAuth 2.1 to a Spring Boot MCP server exposing payment, fraud, and open banking tools. Tool calls pass through an audit aspect into domain services, which talk to outbound ports backed by either mock adapters (local profile) or Stripe, pgvector with Ollama, and Open Bank Project (prod profile). A separate infrastructure layer provides audit logging, idempotency caching, and event publishing via PostgreSQL, Redis, and Kafka. Distributed tracing via OpenTelemetry exports to Jaeger, and Prometheus scrapes metrics.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
