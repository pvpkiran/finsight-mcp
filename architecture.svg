<svg width="680" height="760" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img">
<title>FinSight MCP architecture</title>
<desc>Claude Desktop connects via OAuth 2.1 to a Spring Boot MCP server exposing payment, fraud, and open banking tools. Tool calls pass through an audit aspect into domain services, which talk to outbound ports backed by either mock adapters (local profile) or Stripe, pgvector with Ollama, and Open Bank Project (prod profile). A separate infrastructure layer provides audit logging, idempotency caching, and event publishing via PostgreSQL, Redis, and Kafka.</desc>
