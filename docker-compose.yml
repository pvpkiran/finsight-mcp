networks:
  finsight-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:

services:

  # ── PostgreSQL 16 + pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finsight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./finsight-infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - finsight-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight -d finsight"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finsight-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redis_secret
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - finsight-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Ui ──────────────────────────────
  redis-ui:
    image: redis/redisinsight:latest
    container_name: finsight-redis-ui
    restart: unless-stopped
    ports:
      - "8001:5540"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - finsight-net

  # ── Apache Kafka (KRaft — no Zookeeper) ──────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: finsight-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "29092:29092"
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - finsight-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka topic initialiser (runs once then exits) ────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: finsight-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    volumes:
      - ./finsight-infra/kafka/create-topics.sh:/create-topics.sh:ro
    networks:
      - finsight-net
    restart: "no"

  # ── Keycloak 25 ───────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: finsight-keycloak
    restart: unless-stopped
    command: >
      start-dev
      --import-realm
      --http-port=8180
      --hostname=https://8fb0-84-144-71-232.ngrok-free.app
      --proxy-headers=xforwarded
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_secret
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/finsight
      KC_DB_USERNAME: finsight
      KC_DB_PASSWORD: finsight_secret
      KC_DB_SCHEMA: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8180"
      - "9000:9000"
    volumes:
      - ./finsight-infra/keycloak/finsight-realm.json:/opt/keycloak/data/import/finsight-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finsight-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Kafka UI ──────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finsight-kafka-ui
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: finsight
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - finsight-net