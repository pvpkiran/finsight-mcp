# ─────────────────────────────────────────────────────────────
#  FinSight MCP — prod profile
#
#  Real infrastructure: PostgreSQL, Redis, Kafka, Flyway
#  Real adapters: Stripe payments, pgvector+Ollama fraud, OBP open banking
#  JWK validation: Keycloak via ngrok (for Claude Desktop OAuth)
#
#  Prerequisites:
#    - ngrok tunnels running for FinSight and Keycloak
#    - FINSIGHT_PUBLIC_URL env var set to FinSight ngrok URL
#    - KEYCLOAK_PUBLIC_URL env var set to Keycloak ngrok URL
#    - STRIPE_API_KEY env var set
#    - OBP_CONSUMER_KEY, OBP_USERNAME, OBP_PASSWORD env vars set
#    - Ollama running with nomic-embed-text model
#
#  Use for: Claude Desktop connection, Stripe sandbox testing
#
#  Start with:
#    make app-prod
#  Or:
#    ./mvnw spring-boot:run -Dspring-boot.run.profiles=prod
# ─────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finsight}
    username: ${DB_USER:finsight}
    password: ${DB_PASSWORD:finsight_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: finsight-hikari

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    schemas: finsight,audit

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false
        delivery.timeout.ms: 5000
        request.timeout.ms: 3000
      acks: all
      retries: 1
    consumer:
      group-id: finsight-mcp
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.finsight.*"

  security:
    oauth2:
      resourceserver:
        jwt:
          # Tokens issued by Keycloak via ngrok — issuer claim must match ngrok URL
          issuer-uri: ${KEYCLOAK_PUBLIC_URL:https://acc1-84-144-71-232.ngrok-free.app}/realms/finsight
          # Fetch JWKs from localhost — no ngrok dependency for key validation
          jwk-set-uri: http://localhost:8180/realms/finsight/protocol/openid-connect/certs

  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text

finsight:
  public-url: ${FINSIGHT_PUBLIC_URL:https://5bd9-84-144-71-232.ngrok-free.app}
  stripe:
    api-key: ${STRIPE_API_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}