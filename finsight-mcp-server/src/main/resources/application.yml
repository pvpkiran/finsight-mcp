# ─────────────────────────────────────────────────────────────
#  FinSight MCP Server — base configuration
#  Profile-specific config in application-local.yml / application-prod.yml
# ─────────────────────────────────────────────────────────────

spring:
  application:
    name: finsight-mcp

  ai:
    mcp:
      server:
        name: finsight-mcp-server
        version: 0.0.1
        protocol: STREAMABLE
        type: SYNC
        base-path: /mcp

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    com.finsight: DEBUG
    org.springframework.ai.mcp: INFO
    org.springframework.security: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"

finsight:
  idempotency:
    ttl-hours: 24
  async-jobs:
    ttl-days: 7
  audit:
    enabled: true
  tenant:
    header: X-Tenant-ID
  # OBP credentials — used in prod profile only
  obp:
    consumer-key: ${OBP_CONSUMER_KEY:your-consumer-key}
    username: ${OBP_USERNAME:your-username}
    password: ${OBP_PASSWORD:your-password}